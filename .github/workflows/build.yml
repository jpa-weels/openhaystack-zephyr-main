name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          path: openhaystack-zephyr

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install west
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            git cmake ninja-build gperf ccache dfu-util \
            device-tree-compiler wget xz-utils file make \
            gcc gcc-multilib g++-multilib

      - name: Initialize west workspace
        working-directory: openhaystack-zephyr
        run: |
          west init -l .
          west update
          pip install -r ../zephyr/scripts/requirements-base.txt

      - name: Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.13.2/zephyr-sdk-0.13.2-linux-x86_64-setup.run
          chmod +x zephyr-sdk-0.13.2-linux-x86_64-setup.run
          ./zephyr-sdk-0.13.2-linux-x86_64-setup.run -- -d ~/zephyr-sdk

      - name: Build firmware
        working-directory: openhaystack-zephyr
        run: west build -b nrf52840dongle_nrf52840 -s app

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openhaystack-zephyr/build/zephyr/zephyr.*
